<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Build Any App - Complete Training Guide</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Learn to build production-ready web applications using Claude Code, Cursor, Supabase, Vercel, and GitHub - from zero to deployed in 21 days">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Google Fonts - OrbitumAI Brand -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Docsify Theme - Dark Mode -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <!-- Custom Styles -->
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #C4622D;
      --theme-color-dark: #b5571f;
      --accent-color: #D4A843;
    }

    /* Custom Dark Theme */
    body {
      --base-background-color: #0D0D0D;
      --base-color: #F7F5F2;
      --sidebar-background: #0a0a0a;
      --sidebar-border-color: rgba(247,245,242,.08);
    }

    /* Sidebar Styling */
    .sidebar {
      background: var(--sidebar-background);
      border-right: 1px solid var(--sidebar-border-color);
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav a {
      color: rgba(247,245,242,.45);
      border-left: 3px solid transparent;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .sidebar-nav a:hover {
      background: rgba(196,98,45,.07);
      border-left-color: #C4622D;
      color: #F7F5F2;
    }

    .sidebar-nav li.active > a {
      border-left-color: #C4622D;
      color: #C4622D;
      background: rgba(196,98,45,.07);
      font-weight: 600;
    }

    /* App Name */
    .app-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      padding: 1rem 1.5rem;
      color: var(--theme-color);
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    /* Search Box */
    .search input {
      background: #1E1E1E !important;
      border: 1px solid #3F3F46 !important;
      color: #E4E4E7 !important;
    }

    .search input:focus {
      border-color: var(--theme-color) !important;
    }

    /* Content Area */
    .content {
      padding-top: 0;
    }

    /* Code Blocks */
    pre {
      background: #1E1E1E !important;
      border: 1px solid #3F3F46;
      border-radius: 8px;
    }

    code {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      background: #1E1E1E;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Tables */
    table {
      border-collapse: collapse;
      margin: 1.5rem 0;
      background: #18181B;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #1F1F23;
      color: var(--theme-color);
      font-weight: 600;
    }

    td, th {
      border: 1px solid #3F3F46;
      padding: 0.75rem 1rem;
    }

    /* Alerts/Blockquotes */
    blockquote {
      border-left: 4px solid var(--theme-color);
      background: #1F1F23;
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      border-radius: 4px;
    }

    /* Links */
    a {
      color: var(--theme-color);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-color);
    }

    /* Headings */
    h1 {
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.5rem;
    }

    h2 {
      border-bottom: 1px solid #3F3F46;
      padding-bottom: 0.3rem;
      margin-top: 2rem;
    }

    /* Custom Badges */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 0.5rem;
    }

    .badge-primary { background: var(--theme-color); color: white; }
    .badge-success { background: #10B981; color: white; }
    .badge-warning { background: #F59E0B; color: black; }
    .badge-error { background: #EF4444; color: white; }

    /* Copy Button for Code Blocks */
    .docsify-copy-code-button {
      background: var(--theme-color) !important;
      color: white !important;
    }

    /* Pagination */
    .pagination-item a {
      background: #1F1F23;
      border: 1px solid #3F3F46;
      color: #E4E4E7;
    }

    .pagination-item a:hover {
      background: #27272A;
      border-color: var(--theme-color);
    }

    /* Sidebar Toggle */
    .sidebar-toggle {
      background: var(--theme-color);
    }

    /* Custom Hero Section */
    .hero {
      background: linear-gradient(135deg, var(--theme-color) 0%, var(--accent-color) 100%);
      padding: 3rem 2rem;
      margin: -2rem -2rem 2rem;
      border-radius: 12px;
      color: white;
    }

    .hero h1 {
      border: none;
      color: white;
      margin: 0;
    }

    .hero p {
      font-size: 1.25rem;
      opacity: 0.9;
    }

    /* Checklist Styling */
    .checklist {
      list-style: none;
      padding-left: 0;
    }

    .checklist li:before {
      content: '☐';
      margin-right: 0.5rem;
      color: #A1A1AA;
      font-size: 1.2rem;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
      margin: 2rem 0;
    }

    .timeline:before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #3F3F46;
    }

    .timeline-item {
      position: relative;
      padding-bottom: 2rem;
    }

    .timeline-item:before {
      content: '';
      position: absolute;
      left: -2.4rem;
      top: 0.5rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--theme-color);
      border: 3px solid var(--base-background-color);
    }
  </style>
</head>
<body>
<a href="../../index.html" style="position:fixed;top:16px;right:20px;z-index:99999;display:inline-flex;align-items:center;gap:7px;background:#C4622D;color:#F7F5F2;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:8px;text-decoration:none;letter-spacing:.3px;box-shadow:0 4px 16px rgba(196,98,45,.35);transition:background .18s;" onmouseover="this.style.background='#b5571f'" onmouseout="this.style.background='#C4622D'">← Back to Home</a>
  <div id="app">Loading...</div>
  
  <script>
    window.$docsify = {
      name: '🚀 Build Any App',
      repo: '',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      
      // Search Plugin
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search the guide...',
        noData: 'No results found',
        depth: 6,
        hideOtherSidebarContent: false
      },

      // Pagination
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true
      },

      // Copy Code
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },

      // Theme Color
      themeColor: '#4F46E5',

      // Tabs Plugin
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      },

      // Custom Plugins
      plugins: [
        // Add custom formatting for badges
        function(hook, vm) {
          hook.beforeEach(function(content) {
            // Transform badge syntax: {badge type|text} → HTML badge
            content = content.replace(/\{badge (primary|success|warning|error)\|(.*?)\}/g, 
              '<span class="badge badge-$1">$2</span>');
            
            // Transform checklist items
            content = content.replace(/^\s*- \[ \]/gm, '<li class="checklist">');
            
            return content;
          });
        },

        // Add "Last Updated" footer
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            const footer = `
              <hr style="margin-top: 3rem; border-color: #3F3F46;">
              <p style="color: #71717A; font-size: 0.875rem; text-align: center;">
                📚 Build Any App Training Guide | Updated ${new Date().toLocaleDateString()} | 
                <a href="#/" style="color: #4F46E5;">Back to Top</a>
              </p>
            `;
            next(html + footer);
          });
        }
      ]
    };
  </script>
  
  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  
  <!-- Copy Code Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  
  <!-- Pagination Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  
  <!-- Tabs Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  
  <!-- Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  
  <!-- Zoom Image Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  
  <!-- Emoji Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
</body>
</html>
